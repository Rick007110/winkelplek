# 1. Use "..." to keep auto-detected tools (PHP, Composer, Node)
#    and only add "unzip" (which Composer often needs).
[phases.setup]
nixPkgs = ["...", "unzip"]

# 2. Install BOTH PHP and Node dependencies
[phases.install]
cmds = [
    "mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache",
    "composer install --no-dev --optimize-autoloader --ignore-platform-reqs",
    "npm install"
]

# 3. Build the assets
[phases.build]
cmds = [
    "npm run build",
    "php artisan config:cache",
    "php artisan route:cache",
    "php artisan view:cache"
]

# 4. Start the server
[start]
cmd = "php artisan serve --host=0.0.0.0 --port=80"