# 1. Install PHP, Composer, Node.js, Git, and Unzip
[phases.setup]
nixPkgs = ["php82", "php82Packages.composer", "nodejs", "git", "unzip"]

# 2. Install dependencies
[phases.install]
cmds = ["mkdir -p storage/framework/sessions storage/framework/views storage/framework/cache", "composer install --no-dev --optimize-autoloader", "npm install"]

# 3. Build the CSS/JS
[phases.build]
cmds = ["npm run build", "php artisan config:cache", "php artisan route:cache", "php artisan view:cache"]

# 4. Start the server
[start]
cmd = "php artisan serve --host=0.0.0.0 --port=80"